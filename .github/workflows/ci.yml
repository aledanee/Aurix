name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          rebar3-version: 'latest'

      - name: Restore rebar3 cache
        uses: actions/cache@v4
        with:
          path: _build
          key: rebar3-${{ runner.os }}-${{ hashFiles('rebar.lock', 'rebar.config') }}
          restore-keys: |
            rebar3-${{ runner.os }}-

      - name: Compile
        run: rebar3 compile

      - name: Run EUnit tests
        run: rebar3 eunit
